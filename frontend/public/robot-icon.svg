<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bgGradient" cx="50%" cy="45%" r="55%">
      <stop offset="0%" style="stop-color:#5865f2;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#5865f2;stop-opacity:0.05" />
    </radialGradient>
    <linearGradient id="faceGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6371f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4e5bd9;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="100" cy="100" r="82" fill="url(#bgGradient)"/>
  <!-- Main face circle -->
  <circle cx="100" cy="100" r="62" fill="url(#faceGradient)"/>
  <!-- Antenna on top -->
  <rect x="94" y="28" width="12" height="18" rx="6" fill="url(#faceGradient)"/>
  <circle cx="100" cy="22" r="8" fill="#3a46c2"/>
  <!-- Eyes - two curved arcs like Doubao -->
  <path d="M65 82 Q 78 68 91 82" fill="none" stroke="white" stroke-width="5" stroke-linecap="round"/>
  <path d="M109 82 Q 122 68 135 82" fill="none" stroke="white" stroke-width="5" stroke-linecap="round"/>
  <!-- Small friendly smile -->
  <path d="M85 122 Q 100 135 115 122" fill="none" stroke="white" stroke-width="4" stroke-linecap="round"/>
  <!-- Cute cheeks highlight -->
  <circle cx="72" cy="100" r="6" fill="white" opacity="0.4"/>
  <circle cx="128" cy="100" r="6" fill="white" opacity="0.4"/>
</svg>
